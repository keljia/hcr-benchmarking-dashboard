  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      background: #16213e;
      padding: 12px 20px;
      border-bottom: 2px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    .header-stats {
      font-size: 0.85rem;
      color: #a0a0c0;
    }

    #progress-bar-container {
      width: 100%;
      background: #0f3460;
      height: 4px;
      flex-shrink: 0;
    }

    #progress-bar {
      height: 100%;
      background: #e94560;
      width: 0%;
      transition: width 0.3s;
    }

    #status-bar {
      background: #16213e;
      padding: 6px 20px;
      font-size: 0.78rem;
      color: #a0a0c0;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #status-bar button {
      background: #e94560;
      color: white;
      border: none;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    #status-bar button:hover { background: #c73652; }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 8px;
    }

    .leaflet-popup-tip { background: #16213e; }

    .popup-addr { font-weight: 600; color: #e94560; font-size: 0.9rem; }
    .popup-detail { font-size: 0.82rem; color: #a0a0c0; margin-top: 3px; }

    .leaflet-control-zoom a {
      background-color: #16213e !important;
      color: #e0e0e0 !important;
      border-color: #0f3460 !important;
    }

    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-clip: padding-box;
    }
    .marker-cluster-small { background-color: rgba(233,69,96,0.3); }
    .marker-cluster-small div { background-color: rgba(233,69,96,0.7); }
    .marker-cluster-medium { background-color: rgba(233,150,50,0.3); }
    .marker-cluster-medium div { background-color: rgba(233,150,50,0.7); }
    .marker-cluster-large { background-color: rgba(100,180,255,0.3); }
    .marker-cluster-large div { background-color: rgba(100,180,255,0.7); }
    .marker-cluster div { color: #fff; font-weight: 700; }

    #legend {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      line-height: 1.8;
      color: #a0a0c0;
    }
    #legend h4 { color: #e0e0e0; margin-bottom: 4px; font-size: 0.82rem; }
  </style>
</head>

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch(e) {}
}

function addMarker(idx, lat, lon) {
  const addr = ADDRESSES[idx];
  const fullAddr = `${addr.a}, ${addr.c}, ${addr.s} ${addr.z}`;
  const marker = L.circleMarker([lat, lon], {
    radius: 6,
    fillColor: '#e94560',
    color: '#fff',
    weight: 1,
    fillOpacity: 0.85,
  });
  marker.bindPopup(
    `<div class="popup-addr">${addr.a}</div>` +
    `<div class="popup-detail">${addr.c}, ${addr.s}</div>` +
    `<div class="popup-detail">ZIP: ${addr.z}</div>`
  );
  clusterGroup.addLayer(marker);
  totalMapped++;
}

function updateUI(done, total, fromCache) {
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('status-text').textContent =
    `Geocoded ${done} / ${total} addresses (${pct}%)` +
    (fromCache > 0 ? ` — ${fromCache} loaded from cache` : '');
  document.getElementById('header-stats').textContent =
    `${totalMapped} properties on map`;
}

async function geocodeAll() {
  geocoded = loadCache();

  // First pass: render everything already in cache
  let cacheCount = 0;
  for (const [idx, coords] of Object.entries(geocoded)) {
    addMarker(parseInt(idx), coords.lat, coords.lon);
    cacheCount++;
  }

  const needsGeocode = ADDRESSES
    .map((_, i) => i)
    .filter(i => !(i in geocoded));

  if (needsGeocode.length === 0) {
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('status-text').textContent =
      `All ${ADDRESSES.length} addresses loaded from cache.`;
    document.getElementById('pause-btn').style.display = 'none';
    document.getElementById('cache-note').textContent = 'All results cached.';
    document.getElementById('header-stats').textContent =
      `${totalMapped} properties on map`;
    return;
  }

  document.getElementById('cache-note').textContent =
    cacheCount > 0 ? `${cacheCount} from cache, ${needsGeocode.length} to fetch` : '';

  updateUI(cacheCount, ADDRESSES.length, cacheCount);

  let done = cacheCount;
  for (const idx of needsGeocode) {
    if (abortFlag) break;

    // Wait while paused
    while (paused) { await new Promise(r => setTimeout(r, 300)); }

    const addr = ADDRESSES[idx];
    const query = encodeURIComponent(
      `${addr.a}, ${addr.c}, ${addr.s}, ${addr.z}, USA`
    );

    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1&addressdetails=0`,
        { headers: { 'Accept-Language': 'en' } }
      );
      const data = await res.json();
      if (data && data.length > 0) {
        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);
        geocoded[idx] = { lat, lon };
        addMarker(idx, lat, lon);
        if (done % 10 === 0) saveCache(geocoded);
      }
    } catch(e) {
      // silently skip failed lookups
    }

    done++;
    updateUI(done, ADDRESSES.length, cacheCount);

    // Nominatim rate-limit: 1 req/sec
    await new Promise(r => setTimeout(r, DELAY_MS));
  }

  saveCache(geocoded);
  document.getElementById('progress-bar').style.width = '100%';
  const matched = Object.keys(geocoded).length;
  document.getElementById('status-text').textContent =
    `Done! ${matched} / ${ADDRESSES.length} addresses geocoded. Results cached in browser.`;
  document.getElementById('pause-btn').style.display = 'none';
}

geocodeAll();
</script>
